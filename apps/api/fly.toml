# fly.toml app configuration file generated for koomiteh-api on 2026-05-07T16:46:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'koomiteh-api'
primary_region = 'fra'

[build]
  dockerfile = 'apps/api/Dockerfile'

[env]
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'
  PORT = '3000'
  WEB_ORIGIN = 'https://koomiteh.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
